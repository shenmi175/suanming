name: cyber-fate

services:
  app:
    build:
      context: ./cyber-fate-dev
      dockerfile: "${DOCKERFILE:-Dockerfile}"
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,::1,postgres,searxng}"
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        no_proxy: "${no_proxy:-localhost,127.0.0.1,::1,postgres,searxng}"
    ports:
      - "${APP_PORT:-3000}:3000"
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:${APP_PORT:-3000}}"
      FRONTEND_PORT: "${FRONTEND_PORT:-3000}"
      BACKEND_PORT: "${BACKEND_PORT:-4000}"
      FRONTEND_HOST: "${FRONTEND_HOST:-0.0.0.0}"
      BACKEND_HOST: "${BACKEND_HOST:-0.0.0.0}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-http://localhost:${APP_PORT:-3000}}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-}"
      BACKEND_API_BASE_URL: "${BACKEND_API_BASE_URL:-http://127.0.0.1:4000}"
      NEXT_PUBLIC_BACKEND_PORT: "${NEXT_PUBLIC_BACKEND_PORT:-4000}"
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://cyber_fate:cyber_fate_local@postgres:5432/cyber_fate}"
      CYBER_FATE_ENV_SECRET: "${CYBER_FATE_ENV_SECRET:-}"
      ENABLE_OPENAI: "${ENABLE_OPENAI:-false}"
      CYBER_FATE_LLM_MODE: "${CYBER_FATE_LLM_MODE:-perceptleap}"
      ENABLE_PERCEPTLEAP: "${ENABLE_PERCEPTLEAP:-true}"
      ENABLE_PERCEPTLEAP_IMAGE: "${ENABLE_PERCEPTLEAP_IMAGE:-false}"
      GENERATE_REPORT_IMAGE: "${GENERATE_REPORT_IMAGE:-false}"
      PERCEPTLEAP_API_KEY: "${PERCEPTLEAP_API_KEY:-}"
      PERCEPTLEAP_API_KEY_ENCRYPTED: "${PERCEPTLEAP_API_KEY_ENCRYPTED:-}"
      PERCEPTLEAP_BASE_URL: "${PERCEPTLEAP_BASE_URL:-https://api.perceptleap.com/v1}"
      PERCEPTLEAP_TEXT_MODEL: "${PERCEPTLEAP_TEXT_MODEL:-gpt-5.4}"
      PERCEPTLEAP_MODEL_INTERVIEWER: "${PERCEPTLEAP_MODEL_INTERVIEWER:-}"
      PERCEPTLEAP_MODEL_RESEARCHER: "${PERCEPTLEAP_MODEL_RESEARCHER:-}"
      PERCEPTLEAP_MODEL_FUSION: "${PERCEPTLEAP_MODEL_FUSION:-}"
      PERCEPTLEAP_MODEL_COPYWRITER: "${PERCEPTLEAP_MODEL_COPYWRITER:-}"
      PERCEPTLEAP_MODEL_REVIEWER: "${PERCEPTLEAP_MODEL_REVIEWER:-}"
      PERCEPTLEAP_MODEL_IMAGE_DIRECTOR: "${PERCEPTLEAP_MODEL_IMAGE_DIRECTOR:-}"
      PERCEPTLEAP_IMAGE_MODEL: "${PERCEPTLEAP_IMAGE_MODEL:-gpt-image-2}"
      PERCEPTLEAP_IMAGE_SIZE: "${PERCEPTLEAP_IMAGE_SIZE:-1024x1024}"
      PERCEPTLEAP_IMAGE_QUALITY: "${PERCEPTLEAP_IMAGE_QUALITY:-low}"
      PERCEPTLEAP_IMAGE_OUTPUT_FORMAT: "${PERCEPTLEAP_IMAGE_OUTPUT_FORMAT:-png}"
      PERCEPTLEAP_MAX_RETRIES: "${PERCEPTLEAP_MAX_RETRIES:-2}"
      PERCEPTLEAP_PROXY_URL: "${PERCEPTLEAP_PROXY_URL:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_API_KEY_ENCRYPTED: "${OPENAI_API_KEY_ENCRYPTED:-}"
      OPENAI_MODEL_DEFAULT: "${OPENAI_MODEL_DEFAULT:-}"
      OPENAI_MODEL_INTERVIEWER: "${OPENAI_MODEL_INTERVIEWER:-}"
      OPENAI_MODEL_RESEARCHER: "${OPENAI_MODEL_RESEARCHER:-}"
      OPENAI_MODEL_FUSION: "${OPENAI_MODEL_FUSION:-}"
      OPENAI_MODEL_COPYWRITER: "${OPENAI_MODEL_COPYWRITER:-}"
      OPENAI_MODEL_REVIEWER: "${OPENAI_MODEL_REVIEWER:-}"
      OPENAI_MODEL_IMAGE_DIRECTOR: "${OPENAI_MODEL_IMAGE_DIRECTOR:-}"
      ENABLE_WEB_SEARCH: "${ENABLE_WEB_SEARCH:-true}"
      WEB_RESEARCH_PROVIDER: "${WEB_RESEARCH_PROVIDER:-searxng}"
      WEB_RESEARCH_REQUIRED: "${WEB_RESEARCH_REQUIRED:-false}"
      WEB_RESEARCH_MIN_SOURCES: "${WEB_RESEARCH_MIN_SOURCES:-2}"
      WEB_RESEARCH_MAX_RESULTS: "${WEB_RESEARCH_MAX_RESULTS:-20}"
      WEB_RESEARCH_FETCH_LIMIT: "${WEB_RESEARCH_FETCH_LIMIT:-12}"
      WEB_RESEARCH_CACHE_TTL_HOURS: "${WEB_RESEARCH_CACHE_TTL_HOURS:-24}"
      WEB_PAGE_CACHE_TTL_HOURS: "${WEB_PAGE_CACHE_TTL_HOURS:-168}"
      WEB_FETCH_TIMEOUT_MS: "${WEB_FETCH_TIMEOUT_MS:-12000}"
      WEB_FETCH_MAX_BYTES: "${WEB_FETCH_MAX_BYTES:-1500000}"
      WEB_FETCH_MAX_CHARS: "${WEB_FETCH_MAX_CHARS:-14000}"
      WEB_FETCH_PROXY_URL: "${WEB_FETCH_PROXY_URL:-}"
      WEB_FETCH_USER_AGENT: "${WEB_FETCH_USER_AGENT:-CyberFateResearchBot/0.1 (+local self-hosted research; respects publisher rights)}"
      WEB_RESEARCH_COPYRIGHT_NOTICE: "${WEB_RESEARCH_COPYRIGHT_NOTICE:-联网资料仅用于摘要、事实核对与来源引用；报告不得大段复制网页原文，请遵守原网站版权与使用条款。}"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://searxng:8080}"
      SEARXNG_SEARCH_LANGUAGE: "${SEARXNG_SEARCH_LANGUAGE:-zh-CN}"
      OPENAI_VECTOR_STORE_ID: "${OPENAI_VECTOR_STORE_ID:-}"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: "${PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,::1,postgres,searxng}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      no_proxy: "${no_proxy:-localhost,127.0.0.1,::1,postgres,searxng}"
    volumes:
      - cyber_fate_reports:/app/.cyber-fate-data
    depends_on:
      - postgres
      - searxng
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cyber_fate}"
      POSTGRES_USER: "${POSTGRES_USER:-cyber_fate}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cyber_fate_local}"
    volumes:
      - cyber_fate_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_PUBLIC_URL:-http://localhost:${SEARXNG_PORT:-8080}/}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,::1,postgres,searxng}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      no_proxy: "${no_proxy:-localhost,127.0.0.1,::1,postgres,searxng}"
    restart: unless-stopped

volumes:
  cyber_fate_reports:
  cyber_fate_postgres:
